services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./data:/var/www/html/data
      - ./src:/var/www/html/src
      - ./public:/var/www/html/public
    environment:
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      APP_ENV: ${APP_ENV:-dev}
      DB_TYPE: ${DB_TYPE:-sqlite}
      DB_PATH: ${DB_PATH:-/var/www/html/data/app.db}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@hookpool.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-HookPool}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      TOKEN_EXPIRY_HOURS: ${TOKEN_EXPIRY_HOURS:-72}
      DEFAULT_LANG: ${DEFAULT_LANG:-en}
      HOOKPOOL_AUTH: ${HOOKPOOL_AUTH:-no}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Comma-separated HTTP header names to strip before saving/displaying (case-insensitive)
      HOOKPOOL_IGNORED_HEADERS: ${HOOKPOOL_IGNORED_HEADERS:-}
    restart: unless-stopped

  cron:
    image: alpine/curl:latest
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    entrypoint: >
      sh -c '
        while true; do
          URL="http://app/?page=cron";
          if [ -n "$$CRON_SECRET" ]; then
            URL="$$URL&secret=$$CRON_SECRET";
          fi;
          echo "[cron] $$(date "+%Y-%m-%d %H:%M:%S") calling $$URL";
          curl -s "$$URL";
          echo "";
          sleep 60;
        done
      '
    restart: unless-stopped
